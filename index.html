        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));

        .card {
            background: #1c1c1c;

<body>

    <header>
        <h1>Firehawk Live Wallpapers</h1>
        <p>Free Live Wallpapers • Ad-Free • Permanent Collection</p>
    </header>

    <div id="loading">
        <p>🚀 Attempting to load database automatically...</p>
        <div id="local-fix" style="display:none;">
            <p style="color: #f39c12;">Note: Browser security is blocking local file access.</p>
            <button class="local-fix-btn" onclick="document.getElementById('fileInput').click()">Click to Load 'all_wallpapers.json' Manually</button>
            <input type="file" id="fileInput" accept=".json" onchange="handleFileSelect(this)">
        </div>
    </div>

    <div id="content" style="display:none;">
        <div class="status-bar" id="status">Ready</div>

        <div class="pagination" id="paginationTop"></div>

        <div class="grid" id="wallpaperGrid"></div>

        <div class="pagination" id="paginationBottom" style="margin-top: 20px;"></div>
    </div>

    <div class="floating-controls">
        <div class="livewallpaper-float" onclick="openModal()">
            <span>Livewallpaper APP</span>
        </div>
        <a href="https://wa.me/923278647470" class="whatsapp-float" target="_blank">
            <img src="Png/watsapp.png" alt="WhatsApp Chat">
        </a>
    </div>

    <div id="appModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2>🎨 Livewallpaper APP</h2>
            <p>Download Livewallpaper for your device:</p>
            <div class="contact-options">
                <a href="https://apps.microsoft.com/search/publisher?name=Thunderingsky&hl=en-US&gl=PK" class="contact-btn btn-pc" target="_blank">
                    <span>🖥️</span> For PC
                </a>
                <a href="https://play.google.com/store/apps/details?id=com.firehawk.videowallpaper" class="contact-btn btn-mobile" target="_blank">
                    <span>📱</span> For Mobile
                </a>
            </div>
        </div>
    </div>

    <script>
        let library = [];
        let currentPage = 1;
        const itemsPerPage = 20;

        window.onload = async function() {
            try {
                // Try automatic load (Works on Netlify/Servers)
                const response = await fetch('all_wallpapers.json');
                if (!response.ok) throw new Error();
                library = await response.json();
                startApp();
            } catch (e) {
                // Fallback for local folder testing
                document.getElementById('local-fix').style.display = 'block';
            }
        };

        function handleFileSelect(input) {
            const file = input.files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    library = JSON.parse(e.target.result);
                    startApp();
                } catch (err) { alert("Invalid JSON file."); }
            };
            reader.readAsText(file);
        }

        function startApp() {
            loadPageFromUrl();
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';
            renderLibrary();
        }

        function loadPageFromUrl() {
            const params = new URLSearchParams(window.location.search);
            const page = parseInt(params.get('page'));
            if (page && page > 0) {
                currentPage = page;
            }
        }

        function syncPageWithUrl() {
            const url = new URL(window.location);
            url.searchParams.set('page', currentPage);
            window.history.pushState({}, '', url);
        }

        // Modal Functions
        function openModal() {
            document.getElementById('appModal').style.display = 'flex';
        }
        function closeModal() {
            document.getElementById('appModal').style.display = 'none';
        }
        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('appModal');
            if (event.target == modal) {
                closeModal();
            }
        }

        function downloadFile(url, filename, btn) {
            const originalText = btn.innerHTML;
            btn.innerText = "Starting...";
            btn.disabled = true;

            // --- PROXY CONFIGURATION ---
            // Replace the URL below with your Cloudflare Worker URL later
            const CLOUDFLARE_WORKER_URL = "";
            // ---------------------------

            let downloadUrl = url;

            if (window.location.protocol === 'file:') {
                // LOCAL: Use the Node.js server if running
                downloadUrl = 'http://localhost:3000/.netlify/functions/download?url=' + encodeURIComponent(url) + '&filename=' + encodeURIComponent(filename);
            } else if (CLOUDFLARE_WORKER_URL) {
                // GITHUB PAGES: Use your free Cloudflare Worker
                downloadUrl = CLOUDFLARE_WORKER_URL + '?url=' + encodeURIComponent(url) + '&filename=' + encodeURIComponent(filename);
            } else {
                // FALLBACK: Try local PHP proxy (for InfinityFree/000webhost)
                downloadUrl = 'download.php?url=' + encodeURIComponent(url) + '&filename=' + encodeURIComponent(filename);
            }

            const a = document.createElement('a');
            a.href = downloadUrl;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);

            setTimeout(() => {
                btn.innerHTML = originalText;
                btn.disabled = false;
            }, 3000);
        }

        function renderLibrary() {
            const grid = document.getElementById('wallpaperGrid');
            const status = document.getElementById('status');

            const totalPages = Math.ceil(library.length / itemsPerPage);
            if (currentPage > totalPages) currentPage = totalPages;
            if (currentPage < 1) currentPage = 1;

            grid.innerHTML = '';
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageItems = library.slice(start, end);

            pageItems.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';
                const cleanTitle = item.title.trim().replace(/[^a-z0-9]+/gi, '_').toLowerCase();
                const fileName = cleanTitle + ".mp4";

                card.innerHTML = `
                    <div class="media-container">
                        <img src="${item.img}" onerror="this.style.display='none'">
                        <video muted loop playsinline src="${item.video}" onmouseover="this.play()" onmouseout="this.pause()"></video>
                    </div>
                    <div class="info">
                        <div class="title">${item.title}</div>
                        <div class="actions">
                            <button onclick="downloadFile('${item.video}', '${fileName}', this)" class="btn-download">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                                Download
                            </button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });

            status.innerText = `Library Loaded: ${library.length} Wallpapers. Showing ${start+1}-${Math.min(end, library.length)}`;
            renderPagination(totalPages);
            syncPageWithUrl();
        }

        function renderPagination(totalPages) {
            const top = document.getElementById('paginationTop');
            const bottom = document.getElementById('paginationBottom');

            const createPaginationHtml = () => {
                let html = `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="jumpToPage(${currentPage - 1})">Prev</button>`;

                const range = 2; // Pages to show before and after current
                for (let i = 1; i <= totalPages; i++) {
                    if (i === 1 || i === totalPages || (i >= currentPage - range && i <= currentPage + range)) {
                        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="jumpToPage(${i})">${i}</button>`;
                    } else if (i === currentPage - range - 1 || i === currentPage + range + 1) {
                        html += `<span class="page-dots">...</span>`;
                    }
                }

                html += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="jumpToPage(${currentPage + 1})">Next</button>`;
                return html;
            };

            const html = createPaginationHtml();
            top.innerHTML = html;
            bottom.innerHTML = html;
        }

        function jumpToPage(page) {
            currentPage = page;
            renderLibrary();
            window.scrollTo(0, 0);
        }

        function changePage(delta) {
            jumpToPage(currentPage + delta);
        }
    </script>
</body>
